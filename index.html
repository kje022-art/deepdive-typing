<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>딥다이브 코어밸류 타자게임</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b12;
      --surface: #14141f;
      --surface2: #1e1e2e;
      --surface3: #28283c;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.25);
      --accent2: #8b5cf6;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --correct: #4ade80;
      --incorrect: #f87171;
      --composing: #fbbf24;
      --current-bg: rgba(255,255,255,0.12);
      --pending: #3f4a5c;
      --border: #1e293b;
      --gold: #f59e0b;
      --silver: #94a3b8;
      --bronze: #b45309;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .screen {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 680px;
      padding: 24px 20px;
      min-height: 100vh;
    }
    .screen.active { display: flex; }

    /* ─── Gradient text ─── */
    .gradient { background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 13px 20px; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: all 0.18s; letter-spacing: -0.01em; font-family: inherit;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover:not(:disabled) { background: #5254cc; transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface3); color: var(--text); }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }

    /* ─── START SCREEN ─── */
    #screen-start {
      justify-content: center;
      gap: 28px;
    }

    .logo { text-align: center; }
    .logo-title { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.03em; }
    .logo-sub { font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; letter-spacing: 0.04em; text-transform: uppercase; }

    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mode-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 22px 18px;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
    }
    .mode-card:hover { border-color: #334155; background: var(--surface2); }
    .mode-card.selected { border-color: var(--accent); background: rgba(99,102,241,0.08); box-shadow: 0 0 0 1px var(--accent); }
    .mode-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .mode-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .mode-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.5; }

    .field label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }
    .field input {
      width: 100%; padding: 13px 16px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 1rem; font-family: inherit;
      transition: border-color 0.18s;
    }
    .field input:focus { outline: none; border-color: var(--accent); }
    .field input::placeholder { color: var(--text-muted); }

    /* ─── GAME SCREEN ─── */
    #screen-game {
      padding: 16px;
      gap: 14px;
      min-height: 100vh;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .timer-block {}
    .timer-value {
      font-size: 2.8rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      letter-spacing: -0.04em;
      transition: color 0.3s;
    }
    .timer-value.warning { color: #ef4444; animation: blink 0.8s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0.5 } }
    .timer-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; }

    .score-block { text-align: right; }
    .score-value { font-size: 2rem; font-weight: 900; color: var(--accent); line-height: 1; }
    .score-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Live ranking */
    .live-ranking {
      background: var(--surface);
      border-radius: 12px;
      padding: 12px 16px;
      border: 1px solid var(--border);
    }
    .live-ranking-title {
      font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 8px; font-weight: 600;
    }
    .live-rank-list { display: flex; flex-direction: column; gap: 5px; }
    .live-rank-item {
      display: flex; align-items: center; gap: 10px; font-size: 0.83rem;
    }
    .rank-medal {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800; flex-shrink: 0;
    }
    .medal-1 { background: var(--gold); color: #000; }
    .medal-2 { background: var(--silver); color: #000; }
    .medal-3 { background: var(--bronze); color: #fff; }
    .live-rank-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .live-rank-score { color: var(--accent); font-weight: 700; font-size: 0.8rem; white-space: nowrap; }
    .live-empty { font-size: 0.8rem; color: var(--text-muted); text-align: center; padding: 4px 0; }

    /* Sentence */
    .sentence-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: text;
    }
    .cv-tag {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      color: #818cf8;
      border: 1px solid rgba(99,102,241,0.3);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }
    .sentence-text {
      font-size: 1.35rem;
      font-weight: 500;
      line-height: 1.9;
      word-break: keep-all;
      overflow-wrap: break-word;
    }
    .char { display: inline; transition: color 0.04s; }
    .char.correct { color: var(--correct); }
    .char.incorrect { color: var(--incorrect); }
    .char.composing { color: var(--composing); }
    .char.current {
      color: #fff;
      background: var(--current-bg);
      border-radius: 2px;
      outline: 1.5px solid rgba(255,255,255,0.4);
      outline-offset: 1px;
    }
    .char.pending { color: var(--pending); }

    /* Input */
    .input-wrap { position: relative; }
    .typing-input {
      width: 100%; padding: 14px 16px;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-size: 1rem; font-family: inherit;
      transition: border-color 0.18s;
      -webkit-user-select: text;
    }
    .typing-input:focus { outline: none; border-color: var(--accent); }
    .typing-input::placeholder { color: var(--text-muted); }
    .input-hint { font-size: 0.72rem; color: var(--text-muted); text-align: center; margin-top: 8px; }

    /* ─── RESULT SCREEN ─── */
    #screen-result { gap: 20px; padding: 24px 20px; }

    .result-header { text-align: center; padding: 8px 0; }
    .result-header h2 { font-size: 1.4rem; font-weight: 900; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
    }
    .result-mode { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .result-score-val { font-size: 4rem; font-weight: 900; line-height: 1; letter-spacing: -0.04em; }
    .result-score-unit { font-size: 1rem; color: var(--text-muted); margin-top: 6px; }
    .result-my-rank { font-size: 0.9rem; color: var(--text-dim); margin-top: 14px; }
    .result-my-rank strong { color: var(--text); font-size: 1.1rem; }

    .ranking-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .ranking-panel-title {
      padding: 14px 18px 12px;
      font-size: 0.75rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .rank-row {
      display: flex; align-items: center;
      padding: 11px 18px; gap: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      transition: background 0.15s;
    }
    .rank-row:last-child { border-bottom: none; }
    .rank-row.my-row { background: rgba(99,102,241,0.07); }
    .rank-pos { width: 26px; font-weight: 700; color: var(--text-muted); font-size: 0.78rem; flex-shrink: 0; text-align: center; }
    .rank-pos.top3 { color: var(--gold); }
    .rank-pos.top3.r2 { color: var(--silver); }
    .rank-pos.top3.r3 { color: var(--bronze); }
    .rank-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-name.is-me::after { content: ' (나)'; color: var(--accent); font-size: 0.78rem; font-weight: 700; }
    .rank-score-val { color: var(--accent); font-weight: 700; white-space: nowrap; }
    .rank-empty { text-align: center; color: var(--text-muted); font-size: 0.85rem; padding: 20px; }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ─── ADMIN SCREEN ─── */
    #screen-admin { gap: 16px; }
    .admin-title { font-size: 1.5rem; font-weight: 900; }
    .admin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    .admin-card h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 14px; color: var(--text-dim); }
    .admin-preview { margin-bottom: 14px; font-size: 0.82rem; min-height: 40px; }
    .admin-btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .admin-table th { color: var(--text-muted); font-weight: 600; padding: 6px 4px; border-bottom: 1px solid var(--border); text-align: left; }
    .admin-table td { padding: 8px 4px; border-bottom: 1px solid rgba(30,41,59,0.5); }
    .admin-table tr:last-child td { border-bottom: none; }

    /* ─── Mobile ─── */
    @media (max-width: 480px) {
      .mode-grid { grid-template-columns: 1fr; }
      .btn-row { grid-template-columns: 1fr; }
      .sentence-text { font-size: 1.15rem; }
      .timer-value { font-size: 2.2rem; }
    }

    @media (max-height: 700px) {
      #screen-game { gap: 10px; }
      .sentence-container { padding: 16px; }
    }

    /* Start screen ranking */
    .start-ranking {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .start-ranking-col {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .start-ranking-title {
      font-size: 0.72rem; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 10px;
    }
    .start-rank-list { display: flex; flex-direction: column; gap: 5px; }

    /* spinner */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-row { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 16px; color: var(--text-muted); font-size: 0.85rem; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════
     START SCREEN
═══════════════════════════════════════ -->
<div id="screen-start" class="screen active">
  <div class="logo">
    <div class="logo-title gradient">DEEP DIVE</div>
    <div class="logo-sub">Core Value Typing Game</div>
  </div>

  <div class="mode-grid">
    <div class="mode-card" id="card-ta" onclick="selectMode('timeAttack')">
      <div class="mode-icon">⏱</div>
      <div class="mode-title">타임어택</div>
      <div class="mode-desc">60초 안에 최대한<br>많은 문장 완성!</div>
    </div>
    <div class="mode-card" id="card-rd" onclick="selectMode('random')">
      <div class="mode-icon">🎲</div>
      <div class="mode-title">랜덤</div>
      <div class="mode-desc">무작위 문장 1개를<br>가장 빠르게 완성!</div>
    </div>
  </div>

  <div class="start-ranking">
    <div class="start-ranking-col">
      <div class="start-ranking-title">⏱ 타임어택 TOP 3</div>
      <div id="start-rank-ta" class="start-rank-list"><div class="live-empty">-</div></div>
    </div>
    <div class="start-ranking-col">
      <div class="start-ranking-title">🎲 랜덤 TOP 3</div>
      <div id="start-rank-rd" class="start-rank-list"><div class="live-empty">-</div></div>
    </div>
  </div>

  <div class="field">
    <label>이름</label>
    <input type="text" id="name-input" placeholder="홍길동" maxlength="12" autocomplete="off">
  </div>

  <button class="btn btn-primary" id="start-btn" onclick="startGame()" disabled>시작하기</button>
</div>

<!-- ═══════════════════════════════════════
     GAME SCREEN
═══════════════════════════════════════ -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="timer-block">
      <div class="timer-value" id="timer-val">60</div>
      <div class="timer-label" id="timer-label">남은 시간</div>
    </div>
    <div class="score-block">
      <div class="score-value" id="score-val">0</div>
      <div class="score-label" id="score-label">완성 문장</div>
    </div>
  </div>

  <div class="live-ranking">
    <div class="live-ranking-title">🏆 실시간 랭킹</div>
    <div class="live-rank-list" id="live-rank-list">
      <div class="live-empty">아직 기록이 없어요</div>
    </div>
  </div>

  <div class="sentence-container" onclick="focusInput()">
    <span class="cv-tag" id="cv-tag">코어밸류</span>
    <div class="sentence-text" id="sentence-display"></div>
  </div>

  <div class="input-wrap">
    <input
      class="typing-input"
      id="typing-input"
      type="text"
      placeholder="여기에 타이핑하세요..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      inputmode="text"
    >
    <div class="input-hint">오타가 있어도 계속 입력할 수 있어요 · 문장 완성 시 자동으로 다음 문장</div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     RESULT SCREEN
═══════════════════════════════════════ -->
<div id="screen-result" class="screen">
  <div class="result-header">
    <h2 class="gradient">결과</h2>
  </div>

  <div class="result-card">
    <div class="result-mode" id="res-mode-label">타임어택</div>
    <div class="result-score-val gradient" id="res-score">0</div>
    <div class="result-score-unit" id="res-unit">문장 완성</div>
    <div class="result-my-rank" id="res-rank">내 순위: <strong id="res-rank-num">-</strong>위</div>
  </div>

  <div class="ranking-panel">
    <div class="ranking-panel-title" id="res-rank-title">전체 랭킹</div>
    <div id="res-rank-list">
      <div class="loading-row"><div class="spinner"></div> 로딩 중...</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="goToStart()">처음으로</button>
    <button class="btn btn-primary" onclick="playAgain()">다시 도전</button>
  </div>
</div>

<!-- ═══════════════════════════════════════
     ADMIN SCREEN
═══════════════════════════════════════ -->
<div id="screen-admin" class="screen">
  <div class="admin-title gradient">관리자 패널</div>

  <div class="admin-card">
    <h3>⏱ 타임어택 랭킹</h3>
    <div class="admin-preview" id="admin-ta-preview">
      <div class="loading-row"><div class="spinner"></div></div>
    </div>
    <div class="admin-btn-row">
      <button class="btn btn-danger" style="font-size:0.85rem;padding:9px 16px;" onclick="clearRanking('timeAttack')">초기화</button>
    </div>
  </div>

  <div class="admin-card">
    <h3>🎲 랜덤 랭킹</h3>
    <div class="admin-preview" id="admin-rd-preview">
      <div class="loading-row"><div class="spinner"></div></div>
    </div>
    <div class="admin-btn-row">
      <button class="btn btn-danger" style="font-size:0.85rem;padding:9px 16px;" onclick="clearRanking('random')">초기화</button>
    </div>
  </div>

  <div class="admin-card">
    <h3>전체 초기화</h3>
    <button class="btn btn-danger" style="font-size:0.85rem;padding:9px 16px;" onclick="clearRanking('all')">전체 랭킹 초기화</button>
  </div>

  <button class="btn btn-secondary" onclick="goToStart()">게임으로 돌아가기</button>
</div>

  { cv: "위대한 양성", text: "작은 성공을 의도적으로 설계하여 큰 성공의 경로를 만들고 있는가?" },

// ═══════════════════════════════
// State
// ═══════════════════════════════
let gameMode = null;
let playerName = '';
let currentSentence = null;
let gameStartTime = 0;
let gameIntervalId = null;
let rankingPollId = null;
let isComposing = false;
let completedCount = 0;
let timeLeft = 60;
let gameEnded = false;
let finalScore = 0;
let usedIndices = [];

// ═══════════════════════════════
// DOM refs
// ═══════════════════════════════
const elTimerVal     = document.getElementById('timer-val');
const elTimerLabel   = document.getElementById('timer-label');
const elScoreVal     = document.getElementById('score-val');
const elScoreLabel   = document.getElementById('score-label');
const elSentence     = document.getElementById('sentence-display');
const elCvTag        = document.getElementById('cv-tag');
const elLiveList     = document.getElementById('live-rank-list');
const elInput        = document.getElementById('typing-input');
const elNameInput    = document.getElementById('name-input');
const elStartBtn     = document.getElementById('start-btn');

// ═══════════════════════════════
// Screen management
// ═══════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
  if (id === 'screen-start') loadStartRankings();
}

async function loadStartRankings() {
  const configs = [
    { mode: 'timeAttack', elId: 'start-rank-ta' },
    { mode: 'random',     elId: 'start-rank-rd' },
  ];
  for (const { mode, elId } of configs) {
    const el = document.getElementById(elId);
    el.innerHTML = '<div class="live-empty" style="font-size:.75rem">로딩 중...</div>';
    try {
      const snap = await db.ref(`rankings/${mode}`).get();
      const sorted = sortRanking(snap.val() || {}, mode);
      const top3 = sorted.slice(0, 3);
      if (!top3.length) {
        el.innerHTML = '<div class="live-empty">아직 기록이 없어요</div>';
      } else {
        el.innerHTML = top3.map((e, i) => `
          <div class="live-rank-item">
            <div class="rank-medal medal-${i+1}">${i+1}</div>
            <div class="live-rank-name">${escHtml(e.name)}</div>
            <div class="live-rank-score">${fmtScore(e.score, mode)}</div>
          </div>
        `).join('');
      }
    } catch {
      el.innerHTML = '<div class="live-empty">-</div>';
    }
  }
}

// ═══════════════════════════════
// Start screen logic
// ═══════════════════════════════
function selectMode(mode) {
  gameMode = mode;
  document.getElementById('card-ta').classList.toggle('selected', mode === 'timeAttack');
  document.getElementById('card-rd').classList.toggle('selected', mode === 'random');
  checkReady();
}

elNameInput.addEventListener('input', checkReady);
elNameInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !elStartBtn.disabled) startGame(); });

function checkReady() {
  elStartBtn.disabled = !gameMode || !elNameInput.value.trim();
}

// ═══════════════════════════════
// Game start
// ═══════════════════════════════
function startGame() {
  playerName = elNameInput.value.trim();
  if (!playerName || !gameMode) return;

  // Reset state
  gameEnded = false;
  completedCount = 0;
  timeLeft = 60;
  finalScore = 0;
  usedIndices = [];
  isComposing = false;

  // Setup UI labels
  if (gameMode === 'timeAttack') {
    elTimerLabel.textContent = '남은 시간';
    elScoreLabel.textContent = '완성 문장';
    elTimerVal.textContent = '60';
    elScoreVal.textContent = '0';
  } else {
    elTimerLabel.textContent = '경과 시간';
    elScoreLabel.textContent = '랜덤 모드';
    elTimerVal.textContent = '0.0';
    elScoreVal.textContent = '🎲';
  }

  showScreen('screen-game');
  setupInput();
  subscribeRanking();
  loadSentence();

  if (gameMode === 'timeAttack') {
    startCountdown();
  } else {
    gameStartTime = Date.now();
    gameIntervalId = setInterval(() => {
      if (!gameEnded) {
        elTimerVal.textContent = ((Date.now() - gameStartTime) / 1000).toFixed(1);
      }
    }, 100);
  }

  requestAnimationFrame(() => elInput.focus());
}

function focusInput() { elInput.focus(); }

// ═══════════════════════════════
// Countdown (Time Attack)
// ═══════════════════════════════
function startCountdown() {
  gameIntervalId = setInterval(() => {
    timeLeft--;
    elTimerVal.textContent = timeLeft;
    elTimerVal.classList.toggle('warning', timeLeft <= 10);
    if (timeLeft <= 0) endTimeAttack();
  }, 1000);
}

async function endTimeAttack() {
  if (gameEnded) return;
  gameEnded = true;
  clearInterval(gameIntervalId);
  elInput.disabled = true;
  finalScore = completedCount;
  await saveScore(finalScore);
  showResults();
}

// ═══════════════════════════════
// Input listeners
// ═══════════════════════════════
function setupInput() {
  elInput.value = '';
  elInput.disabled = false;
  elInput.removeEventListener('compositionstart', onCSStart);
  elInput.removeEventListener('compositionend', onCSEnd);
  elInput.removeEventListener('input', onInput);
  elInput.removeEventListener('paste', onPaste);
  elInput.addEventListener('compositionstart', onCSStart);
  elInput.addEventListener('compositionend', onCSEnd);
  elInput.addEventListener('input', onInput);
  elInput.addEventListener('paste', onPaste);
}

function onCSStart() { isComposing = true; }
function onCSEnd()   {
  isComposing = false;
  updateColors(elInput.value);
  checkDone(elInput.value);
}
function onInput()   {
  updateColors(elInput.value);
  if (!isComposing) checkDone(elInput.value);
}
function onPaste(e)  { e.preventDefault(); }

// ═══════════════════════════════
// Sentence management
// ═══════════════════════════════
function loadSentence() {
  // Avoid repeats until all used
  if (usedIndices.length >= SENTENCES.length) usedIndices = [];
  let idx;
  do { idx = Math.floor(Math.random() * SENTENCES.length); }
  while (usedIndices.includes(idx));
  usedIndices.push(idx);

  currentSentence = SENTENCES[idx];
  elCvTag.textContent = currentSentence.cv;
  renderSentence(currentSentence.text);
  elInput.value = '';
  updateColors('');
}

function renderSentence(text) {
  elSentence.innerHTML = '';
  for (let i = 0; i < text.length; i++) {
    const span = document.createElement('span');
    span.className = 'char pending';
    span.textContent = text[i];
    elSentence.appendChild(span);
  }
}

// ═══════════════════════════════
// Color feedback
// ═══════════════════════════════
function updateColors(typed) {
  if (!currentSentence) return;
  const spans = elSentence.querySelectorAll('.char');
  const target = currentSentence.text;

  for (let i = 0; i < spans.length; i++) {
    if (i < typed.length) {
      if (isComposing && i === typed.length - 1) {
        spans[i].className = 'char composing';
      } else if (typed[i] === target[i]) {
        spans[i].className = 'char correct';
      } else {
        spans[i].className = 'char incorrect';
      }
    } else if (i === typed.length && !isComposing) {
      spans[i].className = 'char current';
    } else {
      spans[i].className = 'char pending';
    }
  }
}

// ═══════════════════════════════
// Completion check
// ═══════════════════════════════
function checkDone(typed) {
  if (gameEnded || !currentSentence) return;
  if (typed !== currentSentence.text) return;

  if (gameMode === 'timeAttack') {
    completedCount++;
    elScoreVal.textContent = completedCount;
    loadSentence();
  } else {
    gameEnded = true;
    clearInterval(gameIntervalId);
    finalScore = parseFloat(((Date.now() - gameStartTime) / 1000).toFixed(2));
    elInput.disabled = true;
    // Paint all chars green
    updateColors(typed);
    saveScore(finalScore).then(() => showResults());
  }
}

// ═══════════════════════════════
// Firebase: save score
// ═══════════════════════════════
function nameToKey(name) {
  return name.replace(/[.#$\[\]/\s]/g, '_').substring(0, 40);
}

async function saveScore(score) {
  const key = nameToKey(playerName);
  const path = `rankings/${gameMode}/${key}`;
  try {
    const snap = await db.ref(path).get();
    if (!snap.exists()) {
      await db.ref(path).set({ name: playerName, score, ts: Date.now() });
    } else {
      const prev = snap.val();
      const better = gameMode === 'timeAttack' ? score > prev.score : score < prev.score;
      if (better) await db.ref(path).set({ name: playerName, score, ts: Date.now() });
    }
  } catch (err) {
    console.error('saveScore error:', err);
  }
}

// ═══════════════════════════════
// Firebase: live ranking (top 3)
// ═══════════════════════════════
async function pollRankingOnce() {
  try {
    const snap = await db.ref(`rankings/${gameMode}`).get();
    const sorted = sortRanking(snap.val() || {}, gameMode);
    renderLiveRanking(sorted.slice(0, 3));
  } catch (e) { /* silent */ }
}

function subscribeRanking() {
  if (rankingPollId) { clearInterval(rankingPollId); rankingPollId = null; }
  pollRankingOnce();
  rankingPollId = setInterval(pollRankingOnce, 15000);
}

function sortRanking(data, mode) {
  const arr = Object.values(data);
  return mode === 'timeAttack'
    ? arr.sort((a, b) => b.score - a.score)
    : arr.sort((a, b) => a.score - b.score);
}

function fmtScore(score, mode) {
  return mode === 'timeAttack' ? `${score}문장` : `${score.toFixed(2)}초`;
}

function renderLiveRanking(top) {
  if (!top.length) {
    elLiveList.innerHTML = '<div class="live-empty">아직 기록이 없어요</div>';
    return;
  }
  elLiveList.innerHTML = top.map((e, i) => `
    <div class="live-rank-item">
      <div class="rank-medal medal-${i+1}">${i+1}</div>
      <div class="live-rank-name">${escHtml(e.name)}</div>
      <div class="live-rank-score">${fmtScore(e.score, gameMode)}</div>
    </div>
  `).join('');
}

// ═══════════════════════════════
// Results screen
// ═══════════════════════════════
async function showResults() {
  if (rankingPollId) { clearInterval(rankingPollId); rankingPollId = null; }

  showScreen('screen-result');

  document.getElementById('res-mode-label').textContent =
    gameMode === 'timeAttack' ? '⏱ 타임어택' : '🎲 랜덤';

  document.getElementById('res-score').textContent =
    gameMode === 'timeAttack' ? finalScore : finalScore.toFixed(2);

  document.getElementById('res-unit').textContent =
    gameMode === 'timeAttack' ? '문장 완성' : '초';

  document.getElementById('res-rank-title').textContent =
    gameMode === 'timeAttack' ? '타임어택 전체 랭킹' : '랜덤 전체 랭킹';

  const listEl = document.getElementById('res-rank-list');
  listEl.innerHTML = '<div class="loading-row"><div class="spinner"></div> 로딩 중...</div>';

  try {
    const snap = await db.ref(`rankings/${gameMode}`).get();
    const sorted = sortRanking(snap.val() || {}, gameMode);
    const myRank = sorted.findIndex(e => e.name === playerName) + 1;
    document.getElementById('res-rank-num').textContent = myRank || '-';

    if (!sorted.length) {
      listEl.innerHTML = '<div class="rank-empty">기록이 없어요</div>';
    } else {
      listEl.innerHTML = sorted.slice(0, 30).map((e, i) => {
        const posClass = i < 3 ? `top3${i === 1 ? ' r2' : i === 2 ? ' r3' : ''}` : '';
        const isMe = e.name === playerName;
        return `
          <div class="rank-row ${isMe ? 'my-row' : ''}">
            <div class="rank-pos ${posClass}">${i + 1}</div>
            <div class="rank-name ${isMe ? 'is-me' : ''}">${escHtml(e.name)}</div>
            <div class="rank-score-val">${fmtScore(e.score, gameMode)}</div>
          </div>
        `;
      }).join('');
    }
  } catch (err) {
    listEl.innerHTML = '<div class="rank-empty">랭킹을 불러올 수 없어요</div>';
    console.error(err);
  }
}

// ═══════════════════════════════
// Navigation
// ═══════════════════════════════
function goToStart() {
  cleanupGame();
  showScreen('screen-start');
}

function playAgain() {
  cleanupGame();
  startGame();
}

function cleanupGame() {
  clearInterval(gameIntervalId);
  gameIntervalId = null;
  if (rankingPollId) { clearInterval(rankingPollId); rankingPollId = null; }
  elInput.disabled = false;
  elInput.removeEventListener('compositionstart', onCSStart);
  elInput.removeEventListener('compositionend', onCSEnd);
  elInput.removeEventListener('input', onInput);
  elInput.removeEventListener('paste', onPaste);
  elTimerVal.classList.remove('warning');
}

// ═══════════════════════════════
// Admin
// ═══════════════════════════════
async function loadAdminPreviews() {
  for (const [mode, elId] of [['timeAttack', 'admin-ta-preview'], ['random', 'admin-rd-preview']]) {
    const el = document.getElementById(elId);
    try {
      const snap = await db.ref(`rankings/${mode}`).get();
      const sorted = sortRanking(snap.val() || {}, mode);
      if (!sorted.length) {
        el.innerHTML = '<span style="color:var(--text-muted);font-size:.82rem;">기록 없음</span>';
      } else {
        el.innerHTML = `<table class="admin-table">
          <tr><th>#</th><th>이름</th><th>기록</th></tr>
          ${sorted.slice(0, 10).map((e, i) => `
            <tr>
              <td>${i + 1}</td>
              <td>${escHtml(e.name)}</td>
              <td>${fmtScore(e.score, mode)}</td>
            </tr>
          `).join('')}
        </table>`;
      }
    } catch (err) {
      el.innerHTML = '<span style="color:var(--incorrect);font-size:.82rem;">불러오기 실패</span>';
    }
  }
}

async function clearRanking(mode) {
  const label = mode === 'all' ? '전체' : mode === 'timeAttack' ? '타임어택' : '랜덤';
  if (!confirm(`${label} 랭킹을 초기화하시겠습니까?`)) return;
  try {
    if (mode === 'all') await db.ref('rankings').remove();
    else await db.ref(`rankings/${mode}`).remove();
    alert('초기화 완료!');
    loadAdminPreviews();
  } catch (err) {
    alert('오류: ' + err.message);
  }
}

// ═══════════════════════════════
// Utility
// ═══════════════════════════════
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════
// Init
// ═══════════════════════════════
const params = new URLSearchParams(location.search);
if (params.get('admin') === 'true') {
  showScreen('screen-admin');
  loadAdminPreviews();
} else {
  loadStartRankings();
}
</script>
